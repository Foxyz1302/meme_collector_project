name: meme_collector_workspace
description: "Reaction Roulette — a local-first meme/reaction GIF search and clipboard tool."
publish_to: none
version: 0.2.0+1

environment:
  sdk: ^3.13.0-103.1.beta

# Pub workspace — packages share a single .dart_tool/package_config.json
# and dependency versions. Path deps between members resolve at build time.
workspace:
  - packages/meme_collector_core
  - apps/windows_app

dev_dependencies:
  flutter_lints: ^6.0.0
dependencies:
  exui: ^1.0.11
  persistent_header_adaptive: ^2.1.3
  waterfall_flow: ^3.1.1
