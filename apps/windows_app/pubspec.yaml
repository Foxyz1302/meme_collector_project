name: windows_app
description: "Reaction Roulette — Windows desktop client."
publish_to: none
version: 0.2.0+1
resolution: workspace

environment:
  sdk: ^3.13.0-103.1.beta

dependencies:
  flutter:
    sdk: flutter

  # UI
  forui: ^0.23.0
  signals_flutter: ^7.1.0

  # Platform
  path_provider: ^2.1.0
  # super_clipboard pulled temporarily — its super_native_extensions dep has a
  # Windows PowerShell symlink resolution bug on non-C: drives that breaks the
  # build. Re-add when the bug is fixed or when we build the right-click menu
  # (the only feature that needs it). Plain `Clipboard` from flutter/services
  # works fine for URL text copying in the meantime.
  # super_clipboard: ^0.9.1
  url_launcher: ^6.3.0

  # ONNX Runtime — needed here (not in core) because it's a Flutter plugin.
  # Core defines abstract inference interfaces; the app provides ONNX impls.
  #
  # Why onnxruntime_v2 (not flutter_onnxruntime):
  # - flutter_onnxruntime is CPU-only. No DirectML/CUDA EPs.
  # - onnxruntime_v2 supports DirectML (Windows), CUDA (Linux, for future server),
  #   CoreML (macOS), NNAPI (Android) — with appendDefaultProviders() auto-fallback.
  # - API is more verbose (Java/C# style with manual .release()) but that's the
  #   trade-off for GPU support.
  onnxruntime_v2: ^1.23.2+2

  # Image decoding + resizing for CLIP vision tower preprocessing.
  # Pure Dart, no platform deps. Handles PNG/JPEG/WebP/GIF (first frame).
  image: ^4.9.1

  # Path manipulation (used by main.dart, inference_impl.dart, etc.)
  # Already a transitive dep but we use it directly.
  path: ^1.9.0

  # Backend (path dep, same workspace)
  meme_collector_core:
    path: ../../packages/meme_collector_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # NOTE: assets are declared relative to THIS pubspec. The actual model files
  # live at the workspace root in assets/models/ and assets/bin/. For the
  # validation test we load them by absolute path via Directory.current, so
  # no asset declaration is needed. When we ship, we'll either move the assets
  # under this folder or use absolute paths at runtime.
