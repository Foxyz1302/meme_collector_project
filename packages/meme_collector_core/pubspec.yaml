name: meme_collector_core
description: "Backend core for Reaction Roulette. Pure Dart — no Flutter deps. Storage, search, ingest, model2vec text embeddings, and abstract inference interfaces."
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.13.0-103.1.beta

dependencies:
  # Storage / paths (all pure Dart)
  path: ^1.9.0
  ffi: ^2.1.0

  # Text embeddings — pure Dart via Native Assets + Rust FFI
  model2vec: ^1.2.0

  # Networking — pure Dart
  dio: ^5.4.0
  html: ^0.15.4

  # Utilities — pure Dart
  uuid: ^4.4.0
  collection: ^1.18.0
  meta: ^1.15.0

dev_dependencies:
  test: ^1.25.0
